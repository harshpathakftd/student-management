<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Course | Student Management</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 text-slate-800 antialiased">
  <div class="min-h-screen lg:flex">
    <aside class="w-full lg:w-72 bg-slate-900 text-slate-100 p-6 lg:p-8 shadow-xl">
      <div class="mb-8">
        <h1 class="text-2xl font-bold tracking-wide">Student Management</h1>
        <p class="text-sm text-slate-400 mt-1">ERP Control Panel</p>
      </div>
      <nav>
        <ul class="space-y-2">
          <li><a href="/" class="block rounded-lg px-4 py-2.5 hover:bg-slate-800 transition-colors">Dashboard</a></li>
          <li><a href="/students/" class="block rounded-lg px-4 py-2.5 hover:bg-slate-800 transition-colors">Students</a></li>
          <li><a href="/courses/" class="block rounded-lg px-4 py-2.5 bg-indigo-600 text-white font-medium">Courses</a></li>
          <li><a href="/payments/" class="block rounded-lg px-4 py-2.5 hover:bg-slate-800 transition-colors">Payments</a></li>
        </ul>
      </nav>
    </aside>

    <main class="flex-1 p-5 sm:p-8 lg:p-10">
      <div class="mb-6">
        <h2 class="text-3xl font-bold text-slate-900">Add Course</h2>
        <p class="text-slate-500 mt-1">Create a new course with fee and duration.</p>
      </div>

      <section class="max-w-2xl bg-white rounded-2xl shadow-sm border border-slate-200 p-6 sm:p-8">
        <form method="post" class="space-y-5">
          {% csrf_token %}

          <div>
            <label for="name" class="block text-sm font-medium text-slate-700 mb-1.5">Course Name</label>
            <input id="name" name="name" type="text" required
                   class="w-full rounded-lg border border-slate-300 px-3.5 py-2.5 text-slate-800 focus:ring-2 focus:ring-indigo-200 focus:border-indigo-500 outline-none"
                   placeholder="Enter course name">
          </div>

          <div>
            <label for="fees" class="block text-sm font-medium text-slate-700 mb-1.5">Fees (INR)</label>
            <input id="fees" name="fees" type="number" min="0" required
                   class="w-full rounded-lg border border-slate-300 px-3.5 py-2.5 text-slate-800 focus:ring-2 focus:ring-indigo-200 focus:border-indigo-500 outline-none"
                   placeholder="Enter course fees">
          </div>

          <div>
            <label for="duration" class="block text-sm font-medium text-slate-700 mb-1.5">Duration (Months)</label>
            <input id="duration" name="duration" type="number" min="1" required
                   class="w-full rounded-lg border border-slate-300 px-3.5 py-2.5 text-slate-800 focus:ring-2 focus:ring-indigo-200 focus:border-indigo-500 outline-none"
                   placeholder="Enter duration in months">
          </div>

          <div class="flex items-center gap-3 pt-2">
            <button type="submit" class="rounded-lg bg-indigo-600 px-5 py-2.5 text-white font-medium hover:bg-indigo-700 transition-colors">
              Save Course
            </button>
            <a href="/courses/" class="rounded-lg border border-slate-300 px-5 py-2.5 text-slate-700 font-medium hover:bg-slate-50 transition-colors">
              Cancel
            </a>
          </div>
        </form>
      </section>
    </main>
  </div>
</body>
</html>
